# Accessibility scanning with pa11y-ci + axe against live Shopify store
# Catches ~57% of WCAG issues automatically. Manual review needed quarterly.
name: Accessibility

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am — catches Shopify theme updates

jobs:
  accessibility:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run accessibility scan
        run: npx pa11y-ci
