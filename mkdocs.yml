site_name: "Hairgenetix (CLIENT-002)"
site_url: https://mrsmithnl.github.io/hairgenetix/

theme:
  name: material
  palette:
    - scheme: default
      primary: green
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra:
  homepage: https://mrsmithnl.github.io/smith-ai-agency/

plugins:
  - search
  - encryptcontent:
      global_password: !ENV [DOCS_PASSWORD, 'SmithAI2026!']
      search_index: encrypted
      remember_password: true
      session_storage: true

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Strategy:
      - Strategic OS: strategic-os.md
      - SEO Strategy: seo-strategy.md
      - Content Strategy: content-strategy.md
      - Keyword Strategy: keyword-strategy.md
      - Competitor Analysis: competitor-analysis.md
  - Operations:
      - Architecture: architecture.md
      - Processes & Flows: processes-and-flows.md
      - Metrics: metrics.md
      - Todo: todo.md
      - Decisions Log: decisions-log.md
